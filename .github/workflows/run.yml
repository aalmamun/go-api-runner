name: Run Go and Bash

on:
  workflow_dispatch:
    inputs:
      name:
        description: "Enter a name"
        required: true
        default: "john"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Go program
        run: go run main.go "${{ github.event.inputs.name }}"

      - name: Run Bash script
        run: |
          chmod +x script.sh
          ./script.sh "${{ github.event.inputs.name }}"
